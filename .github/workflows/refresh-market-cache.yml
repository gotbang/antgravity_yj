name: Refresh Market Cache

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh cache files
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          YFINANCE_ENABLED: 'true'
        run: pnpm refresh-cache

      - name: Commit refreshed cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache
          git diff --cached --quiet || git commit -m "chore: refresh market cache"
          git push
